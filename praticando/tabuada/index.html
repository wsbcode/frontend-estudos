<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Document</title>
      <link rel="stylesheet" href="style.css" />
   </head>
   <body>
      <div id="idade-container">
         <h2>Verificação de Idade</h2>
         <p>Digite sua idade para acessar:</p>
         <input type="number" id="idade-input" min="0" max="120" />
         <button id="idade-btn">Verificar</button>
         <p id="idade-mensagem"></p>
      </div>

      <div id="app-container" class="oculto">
         <h1>Receber um número e retornar a tabuada</h1>
         <div class="container">
            <input type="text" id="input" />
            <button id="button">Tabuada</button>
            <div class="resultado">
               <h3 style="color: aliceblue" id="exibir"></h3>
            </div>
         </div>
      </div>
      <script src="script.js"></script>
   </body>
</html>
